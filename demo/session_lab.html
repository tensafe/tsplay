<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Lab</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --panel: #fffaf1;
      --ink: #1f2a24;
      --accent: #0e7a52;
      --muted: #6b746f;
      --border: #d7d0c2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(14, 122, 82, 0.12), transparent 32%),
        linear-gradient(180deg, #f7f4ed 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 60px;
    }

    .hero {
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(14, 122, 82, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.05;
    }

    .lead {
      max-width: 640px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-items: start;
    }

    .panel {
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(31, 42, 36, 0.08);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      margin-bottom: 14px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: #ffffff;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    #login {
      background: var(--accent);
      color: #fff;
    }

    #clear-state {
      background: #ece6d9;
      color: var(--ink);
    }

    .state-row {
      padding: 14px 0;
      border-top: 1px solid rgba(215, 208, 194, 0.8);
    }

    .state-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .state-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .state-value {
      margin-top: 6px;
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow" id="session-mode">Browser State Lab</div>
      <h1 id="page-title">Session Lab</h1>
      <p class="lead">
        Use this local page to seed browser cookies and local storage, then inspect them with TSPlay.
      </p>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Seed Session</h2>
        <label for="username">User Name</label>
        <input id="username" type="text" value="demo-user">
        <div class="actions">
          <button id="login" type="button">Login</button>
          <button id="clear-state" type="button">Clear State</button>
        </div>
      </div>

      <div class="panel">
        <h2>Current Browser State</h2>

        <div class="state-row">
          <div class="state-label">Status</div>
          <div class="state-value" id="session-status">Logged out</div>
        </div>

        <div class="state-row">
          <div class="state-label">Cookie Preview</div>
          <div class="state-value" id="cookie-preview">no cookies</div>
        </div>

        <div class="state-row">
          <div class="state-label">Local Storage Preview</div>
          <div class="state-value" id="local-storage-preview">empty</div>
        </div>

        <div class="state-row">
          <div class="state-label">Role</div>
          <div class="state-value" id="role-preview">guest</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    function setCookie(name, value) {
      document.cookie = name + "=" + encodeURIComponent(value) + "; path=/; SameSite=Lax";
    }

    function clearCookie(name) {
      document.cookie = name + "=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
    }

    function renderState() {
      const user = localStorage.getItem("tsplay_user");
      const session = localStorage.getItem("tsplay_session");
      const role = localStorage.getItem("tsplay_role") || "guest";
      const cookies = document.cookie || "no cookies";
      const localParts = [];

      if (user) {
        localParts.push("tsplay_user=" + user);
      }
      if (session) {
        localParts.push("tsplay_session=" + session);
      }
      if (role && role !== "guest") {
        localParts.push("tsplay_role=" + role);
      }

      document.getElementById("session-status").textContent = user ? "Logged in as " + user : "Logged out";
      document.getElementById("cookie-preview").textContent = cookies;
      document.getElementById("local-storage-preview").textContent = localParts.length > 0 ? localParts.join("; ") : "empty";
      document.getElementById("role-preview").textContent = role;
    }

    document.getElementById("login").addEventListener("click", function () {
      const user = document.getElementById("username").value.trim() || "demo-user";
      const session = user + "-session";
      localStorage.setItem("tsplay_user", user);
      localStorage.setItem("tsplay_session", session);
      localStorage.setItem("tsplay_role", "operator");
      setCookie("tsplay_user", user);
      setCookie("tsplay_session", session);
      renderState();
    });

    document.getElementById("clear-state").addEventListener("click", function () {
      localStorage.removeItem("tsplay_user");
      localStorage.removeItem("tsplay_session");
      localStorage.removeItem("tsplay_role");
      clearCookie("tsplay_user");
      clearCookie("tsplay_session");
      renderState();
    });

    renderState();
  </script>
</body>
</html>
