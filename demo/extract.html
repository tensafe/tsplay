<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSPlay Extract Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.5;
    }
    .summary {
      margin: 16px 0;
      padding: 12px 16px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      width: 320px;
      background: #f6f8fa;
    }
    #notice {
      margin-top: 16px;
      padding: 12px 16px;
      border-left: 4px solid #2da44e;
      background: #f0fff4;
      width: 320px;
    }
  </style>
</head>
<body>
  <h1 id="page-title">Order Summary Demo</h1>

  <div class="summary">
    <span id="summary-label">Current pending orders:</span>
    <span id="summary-count">12</span>
  </div>

  <div id="notice">
    <strong>Ready</strong> for export
  </div>

  <ul id="order-list">
    <li data-order-id="A1001">A1001 - Pending</li>
    <li data-order-id="A1002">A1002 - Reviewing</li>
    <li data-order-id="A1003">A1003 - Ready</li>
  </ul>
</body>
</html>
