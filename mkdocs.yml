site_name: TSPlay Docs
site_description: TSPlay browser automation docs, tutorials, and training materials
site_url: https://tensafe.github.io/tsplay/
repo_url: https://github.com/tensafe/tsplay
repo_name: tensafe/tsplay

docs_dir: site-docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  custom_dir: theme-overrides
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tensafe/tsplay
      name: TSPlay on GitHub
  generator: false

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - Skills: docs/skills/README.md
  - 支持行为:
      - 支持行为清单: docs/capability-actions/README.md
      - 页面原子动作: docs/capability-actions/page-primitives.md
      - 文件与表格 I/O: docs/capability-actions/file-and-spreadsheet-io.md
      - HTTP 请求: docs/capability-actions/http-requests.md
      - 邮件通知: docs/capability-actions/email-delivery.md
      - Redis 操作: docs/capability-actions/redis-operations.md
      - 数据库操作: docs/capability-actions/database-operations.md
      - 浏览器状态: docs/capability-actions/browser-state.md
      - Flow 便捷动作: docs/capability-actions/flow-convenience.md
      - Flow 控制流: docs/capability-actions/flow-control.md
      - Lua 回调型能力: docs/capability-actions/lua-callbacks.md
      - 补充浏览器动作: docs/capability-actions/supplemental-browser-actions.md
      - CLI `-action` 参考: docs/actions/README.md
  - 教程:
      - 教程总览（中文）: docs/tutorials/README.zh-CN.md
      - 金字塔课程总图: docs/tutorials/curriculum-overview.zh-CN.md
      - English Tutorial Map: docs/tutorials/README.md
      - 最短起手路径:
          - "今天先跑通: Lesson 01": docs/tutorials/01-hello-world.md
          - "先学提取: Lesson 03": docs/tutorials/03-capture-table.md
          - "先学断言: Lesson 10": docs/tutorials/10-assert-page-state.md
          - "先学批量: Lesson 22": docs/tutorials/22-foreach-batch-import-csv.md
          - "先学会话: Lesson 36": docs/tutorials/36-save-storage-state.md
          - "先看 MCP: Lesson 111": docs/tutorials/111-mcp-list-actions.md
      - 按阶段路线:
          - 新手学习路线: docs/tutorials/track-newbie.zh-CN.md
          - 初级交付路线: docs/tutorials/track-junior.zh-CN.md
          - 中级交付路线: docs/tutorials/track-intermediate.zh-CN.md
          - 高级交付路线: docs/tutorials/track-advanced.zh-CN.md
      - MCP 教程入口: docs/tutorials/119-mcp-chain-overview.md
  - 培训与交付:
      - 培训体系总览: docs/training/README.md
      - AI 协作入门: docs/training/ai-intent-to-flow.md
      - 学习路径: docs/training/learning-path.md
      - 训练营课程表: docs/training/bootcamp-plan.md
      - 实训实验: docs/training/labs.md
      - Capstone 场景: docs/training/capstone-briefs.md
      - 考核与认证: docs/training/assessment.md
      - 教程自动录屏: docs/training/tutorial-video-recording.md
