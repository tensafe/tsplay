site_name: TSPlay Docs
site_description: TSPlay browser automation docs, tutorials, and training materials
site_url: https://tensafe.github.io/tsplay/
repo_url: https://github.com/tensafe/tsplay
repo_name: tensafe/tsplay

docs_dir: site-docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  custom_dir: theme-overrides
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tensafe/tsplay
      name: TSPlay on GitHub
  generator: false

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 教程:
      - 教程总览（中文）: docs/tutorials/README.zh-CN.md
      - English Tutorial Map: docs/tutorials/README.md
      - 常用起手页:
          - "Lesson 01: Hello World": docs/tutorials/01-hello-world.md
          - "Lesson 03: 抓取表格并写 JSON": docs/tutorials/03-capture-table.md
          - "Lesson 10: 页面断言": docs/tutorials/10-assert-page-state.md
          - "Lesson 16: retry 处理偶发失败": docs/tutorials/16-retry-flaky-action.md
          - "Lesson 22: foreach 批量导入 CSV": docs/tutorials/22-foreach-batch-import-csv.md
          - "Lesson 36: 保存浏览器状态": docs/tutorials/36-save-storage-state.md
          - "Lesson 42: 使用命名会话": docs/tutorials/42-use-named-session.md
          - "Lesson 57: 认证导入导出闭环": docs/tutorials/57-use-session-import-export-round-trip.md
          - "Lesson 111: MCP list_actions": docs/tutorials/111-mcp-list-actions.md
          - "Lesson 120: MCP finalize_flow": docs/tutorials/120-mcp-finalize-flow.md
      - 按阶段路线:
          - 新手学习路线: docs/tutorials/track-newbie.zh-CN.md
          - 初级交付路线: docs/tutorials/track-junior.zh-CN.md
          - 中级交付路线: docs/tutorials/track-intermediate.zh-CN.md
          - 高级交付路线: docs/tutorials/track-advanced.zh-CN.md
      - MCP 教程入口: docs/tutorials/119-mcp-chain-overview.md
  - 培训与交付:
      - 培训体系总览: docs/training/README.md
      - AI 无感入门: docs/training/ai-intent-to-flow.md
      - 学习路径: docs/training/learning-path.md
      - 训练营课程表: docs/training/bootcamp-plan.md
      - 实训实验: docs/training/labs.md
      - Capstone 场景: docs/training/capstone-briefs.md
      - 考核与认证: docs/training/assessment.md
      - 教程自动录屏: docs/training/tutorial-video-recording.md
      - 讲师手册: docs/training/trainer-playbook.md
  - 参考与发布:
      - 项目总览（中文）: README.zh-CN.md
      - Project Overview: ReadMe.md
      - 文档入口: docs/README.md
      - 产品方案: docs/product/README.md
      - GitHub Pages 发布说明: docs/github-pages.md
