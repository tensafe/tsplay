schema_version: "1"
name: lesson_44_session_import_with_login_flow
description: Clear the session, log in on the protected import page, and submit a single row.
vars:
  page_url: http://127.0.0.1:8000/demo/session_import_workflow.html
  username: demo-user
steps:
  - action: navigate
    url: "{{page_url}}"

  - action: wait_for_selector
    selector: "#page-title"
    timeout: 5000

  - action: click
    selector: "#clear-session"

  - action: type_text
    selector: "#username"
    text: "{{username}}"

  - action: click
    selector: "#login"

  - action: assert_text
    selector: "#auth-status"
    text: "Logged in as"
    timeout: 5000

  - action: type_text
    selector: "#name"
    text: Alice

  - action: type_text
    selector: "#phone"
    text: "13800000001"

  - action: click
    selector: "#submit"

  - action: assert_text
    selector: "#submit-status"
    text: "Imported"
    timeout: 5000

  - action: extract_text
    selector: "#auth-status"
    timeout: 5000
    save_as: auth_status

  - action: extract_text
    selector: "#submit-status"
    timeout: 5000
    save_as: submit_status

  - action: extract_text
    selector: "#import-count"
    timeout: 5000
    save_as: import_count

  - action: set_var
    save_as: payload
    with:
      value:
        lesson: "44"
        mode: flow
        page_url: "{{page_url}}"
        username: "{{username}}"
        auth_status: "{{auth_status}}"
        submit_status: "{{submit_status}}"
        import_count: "{{import_count}}"

  - action: write_json
    file_path: artifacts/tutorials/44-session-import-with-login-flow.json
    value: "{{payload}}"
