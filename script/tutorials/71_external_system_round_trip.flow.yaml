schema_version: "1"
name: lesson_71_external_system_round_trip_flow
description: Build a new Redis batch from the Lesson 57 export CSV, then persist the same batch id into Postgres summary and detail rows.
vars:
  input_file: artifacts/tutorials/57-use-session-import-export-round-trip-flow.csv
  counter_key: tutorial:session_import:batch_counter
  latest_key: tutorial:session_import:latest_batch
  payload_prefix: "tutorial:session_import:batch:"
  latest_name: ""
  latest_operator: unknown
  detail_rows: []
  report_rows: []
steps:
  - action: read_csv
    file_path: "{{input_file}}"
    with:
      row_number_field: line_no
    save_as: rows

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: detail_scan
    steps:
      - action: set_var
        save_as: latest_name
        with:
          value: "{{row.name}}"
      - action: set_var
        save_as: latest_operator
        with:
          value: "{{row.operator}}"

  - action: redis_incr
    key: "{{counter_key}}"
    save_as: batch_number

  - action: set_var
    save_as: batch_id
    with:
      value: "session-import-batch-{{batch_number}}"

  - action: set_var
    save_as: payload_key
    with:
      value: "{{payload_prefix}}{{batch_id}}"

  - action: set_var
    save_as: detail_rows
    with:
      value: []

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: persist_scan
    steps:
      - action: append_var
        save_as: detail_rows
        with:
          value:
            batch_id: "{{batch_id}}"
            line_no: "{{row.line_no}}"
            name: "{{row.name}}"
            phone: "{{row.phone}}"
            status: "{{row.status}}"
            operator_name: "{{row.operator}}"

  - action: redis_set
    key: "{{payload_key}}"
    ttl_seconds: 3600
    with:
      value:
        lesson: "71"
        batch_id: "{{batch_id}}"
        input_file: "{{input_file}}"
        row_count: "{{persist_scan.iterations}}"
        latest_name: "{{latest_name}}"
        latest_operator: "{{latest_operator}}"

  - action: redis_set
    key: "{{latest_key}}"
    value: "{{batch_id}}"
    ttl_seconds: 3600

  - action: db_transaction
    save_as: transaction_result
    steps:
      - action: db_upsert
        connection: reporting
        save_as: summary_upsert_result
        with:
          table: public.tutorial_import_batches
          columns:
            - batch_id
            - report_file
            - source_lesson
            - row_count
            - operator_name
          key_columns:
            - batch_id
          update_columns:
            - report_file
            - source_lesson
            - row_count
            - operator_name
          row:
            batch_id: "{{batch_id}}"
            report_file: "{{input_file}}"
            source_lesson: "71"
            row_count: "{{persist_scan.iterations}}"
            operator_name: "{{latest_operator}}"

      - action: db_execute
        connection: reporting
        save_as: delete_rows_result
        with:
          sql: DELETE FROM public.tutorial_import_rows WHERE batch_id = $1
          args:
            - "{{batch_id}}"

      - action: db_insert_many
        connection: reporting
        save_as: detail_insert_result
        with:
          table: public.tutorial_import_rows
          columns:
            - batch_id
            - line_no
            - name
            - phone
            - status
            - operator_name
          rows: "{{detail_rows}}"

  - action: redis_get
    key: "{{latest_key}}"
    save_as: latest_batch_id

  - action: redis_get
    key: "{{payload_key}}"
    save_as: payload_text

  - action: db_query_one
    connection: reporting
    save_as: summary_row
    with:
      sql: SELECT batch_id, report_file, source_lesson, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: detail_count_row
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: append_var
    save_as: report_rows
    with:
      value:
        batch_id: "{{batch_id}}"
        input_file: "{{input_file}}"
        row_count: "{{persist_scan.iterations}}"
        latest_name: "{{latest_name}}"
        latest_operator: "{{latest_operator}}"
        latest_batch_id: "{{latest_batch_id}}"

  - action: write_csv
    file_path: artifacts/tutorials/71-external-system-round-trip-flow.csv
    with:
      value: "{{report_rows}}"
      headers:
        - batch_id
        - input_file
        - row_count
        - latest_name
        - latest_operator
        - latest_batch_id

  - action: write_json
    file_path: artifacts/tutorials/71-external-system-round-trip-flow.json
    with:
      value:
        lesson: "71"
        mode: flow
        input_file: "{{input_file}}"
        batch_id: "{{batch_id}}"
        payload_key: "{{payload_key}}"
        transaction_result: "{{transaction_result}}"
        summary_upsert_result: "{{summary_upsert_result}}"
        delete_rows_result: "{{delete_rows_result}}"
        detail_insert_result: "{{detail_insert_result}}"
        latest_batch_id: "{{latest_batch_id}}"
        payload_text: "{{payload_text}}"
        summary_row: "{{summary_row}}"
        detail_count_row: "{{detail_count_row}}"
