schema_version: "1"
name: lesson_75_write_external_sync_audit_row_flow
description: Write one audit row for the latest shared batch so later cleanup can keep the operational data and the audit trail separate.
vars:
  latest_key: tutorial:session_import:latest_batch
steps:
  - action: redis_get
    key: "{{latest_key}}"
    save_as: latest_batch_id

  - action: set_var
    save_as: audit_id
    with:
      value: "{{latest_batch_id}}-sync-audit"

  - action: db_query_one
    connection: reporting
    save_as: summary_row
    with:
      sql: SELECT batch_id, report_file, source_lesson, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{latest_batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: detail_count_row
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{latest_batch_id}}"

  - action: db_upsert
    connection: reporting
    save_as: upsert_result
    with:
      table: public.tutorial_import_audits
      columns:
        - audit_id
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      key_columns:
        - audit_id
      update_columns:
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      row:
        audit_id: "{{audit_id}}"
        batch_id: "{{latest_batch_id}}"
        event_type: external_sync
        status: ok
        detail: latest shared batch synchronized and checked
        success_count: "{{detail_count_row.row_count}}"
        failure_count: 0
        source_lesson: "75"

  - action: db_query_one
    connection: reporting
    save_as: audit_row
    with:
      sql: SELECT audit_id, batch_id, event_type, status, detail, success_count, failure_count, source_lesson FROM public.tutorial_import_audits WHERE audit_id = $1
      args:
        - "{{audit_id}}"

  - action: write_json
    file_path: artifacts/tutorials/75-write-external-sync-audit-row-flow.json
    with:
      value:
        lesson: "75"
        mode: flow
        latest_batch_id: "{{latest_batch_id}}"
        audit_id: "{{audit_id}}"
        summary_row: "{{summary_row}}"
        detail_count_row: "{{detail_count_row}}"
        upsert_result: "{{upsert_result}}"
        audit_row: "{{audit_row}}"
