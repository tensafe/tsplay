schema_version: "1"
name: lesson_26_foreach_batch_import_excel_flow
description: Read Excel rows, import them one by one through the demo form, and collect a result ledger.
vars:
  page_url: http://127.0.0.1:8000/demo/import_workflow.html
  input_file: demo/data/import_users.xlsx
steps:
  - action: set_var
    save_as: import_results
    with:
      value: []

  - action: read_excel
    file_path: "{{input_file}}"
    sheet: Users
    with:
      row_number_field: source_row
    save_as: rows

  - action: navigate
    url: "{{page_url}}"

  - action: wait_for_selector
    selector: "#import-form"
    timeout: 5000

  - action: foreach
    items: "{{rows}}"
    item_var: row
    steps:
      - action: type_text
        selector: "#name"
        text: "{{row.name}}"
      - action: type_text
        selector: "#phone"
        text: "{{row.phone}}"
      - action: click
        selector: "#submit"
      - action: assert_text
        selector: "#submit-status"
        text: "Imported"
        timeout: 5000
      - action: append_var
        save_as: import_results
        with:
          value:
            source_row: "{{row.source_row}}"
            name: "{{row.name}}"
            phone: "{{row.phone}}"
            status: success
      - action: click
        selector: "#clear-form"

  - action: set_var
    save_as: payload
    with:
      value:
        lesson: "26"
        mode: flow
        page_url: "{{page_url}}"
        input_file: "{{input_file}}"
        results: "{{import_results}}"

  - action: write_json
    file_path: artifacts/tutorials/26-foreach-batch-import-excel-flow.json
    value: "{{payload}}"
