schema_version: "1"
name: lesson_68_query_shared_batch_detail_rows_flow
description: Query the shared batch detail rows from Postgres by using the latest Redis batch id.
vars:
  latest_key: tutorial:session_import:latest_batch
steps:
  - action: redis_get
    key: "{{latest_key}}"
    save_as: latest_batch_id

  - action: db_query
    connection: reporting
    save_as: stored_rows
    with:
      sql: SELECT line_no, name, phone, status, operator_name FROM public.tutorial_import_rows WHERE batch_id = $1 ORDER BY line_no
      args:
        - "{{latest_batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: detail_count_row
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{latest_batch_id}}"

  - action: write_json
    file_path: artifacts/tutorials/68-query-shared-batch-detail-rows-flow.json
    with:
      value:
        lesson: "68"
        mode: flow
        latest_batch_id: "{{latest_batch_id}}"
        detail_count_row: "{{detail_count_row}}"
        stored_rows: "{{stored_rows}}"
