schema_version: "1"
name: lesson_80_external_sync_lifecycle_round_trip_flow
description: Build a new external batch, persist it, write an audit row, clean the operational data, and verify the audit still remains.
vars:
  input_file: artifacts/tutorials/57-use-session-import-export-round-trip-flow.csv
  counter_key: tutorial:session_import:batch_counter
  latest_key: tutorial:session_import:latest_batch
  payload_prefix: "tutorial:session_import:batch:"
  latest_name: ""
  latest_operator: unknown
  detail_rows: []
  report_rows: []
steps:
  - action: read_csv
    file_path: "{{input_file}}"
    with:
      row_number_field: line_no
    save_as: rows

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: source_scan
    steps:
      - action: set_var
        save_as: latest_name
        with:
          value: "{{row.name}}"
      - action: set_var
        save_as: latest_operator
        with:
          value: "{{row.operator}}"

  - action: redis_incr
    key: "{{counter_key}}"
    save_as: batch_number

  - action: set_var
    save_as: batch_id
    with:
      value: "session-import-batch-{{batch_number}}"

  - action: set_var
    save_as: payload_key
    with:
      value: "{{payload_prefix}}{{batch_id}}"

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: detail_scan
    steps:
      - action: append_var
        save_as: detail_rows
        with:
          value:
            batch_id: "{{batch_id}}"
            line_no: "{{row.line_no}}"
            name: "{{row.name}}"
            phone: "{{row.phone}}"
            status: "{{row.status}}"
            operator_name: "{{row.operator}}"

  - action: redis_set
    key: "{{payload_key}}"
    ttl_seconds: 3600
    with:
      value:
        lesson: "80"
        batch_id: "{{batch_id}}"
        input_file: "{{input_file}}"
        row_count: "{{detail_scan.iterations}}"
        latest_name: "{{latest_name}}"
        latest_operator: "{{latest_operator}}"

  - action: redis_set
    key: "{{latest_key}}"
    value: "{{batch_id}}"
    ttl_seconds: 3600

  - action: db_transaction
    save_as: transaction_result
    steps:
      - action: db_upsert
        connection: reporting
        save_as: summary_upsert_result
        with:
          table: public.tutorial_import_batches
          columns:
            - batch_id
            - report_file
            - source_lesson
            - row_count
            - operator_name
          key_columns:
            - batch_id
          update_columns:
            - report_file
            - source_lesson
            - row_count
            - operator_name
          row:
            batch_id: "{{batch_id}}"
            report_file: "{{input_file}}"
            source_lesson: "80"
            row_count: "{{detail_scan.iterations}}"
            operator_name: "{{latest_operator}}"

      - action: db_execute
        connection: reporting
        save_as: delete_rows_result
        with:
          sql: DELETE FROM public.tutorial_import_rows WHERE batch_id = $1
          args:
            - "{{batch_id}}"

      - action: db_insert_many
        connection: reporting
        save_as: detail_insert_result
        with:
          table: public.tutorial_import_rows
          columns:
            - batch_id
            - line_no
            - name
            - phone
            - status
            - operator_name
          rows: "{{detail_rows}}"

  - action: set_var
    save_as: audit_id
    with:
      value: "{{batch_id}}-lifecycle-audit"

  - action: db_upsert
    connection: reporting
    save_as: audit_upsert_result
    with:
      table: public.tutorial_import_audits
      columns:
        - audit_id
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      key_columns:
        - audit_id
      update_columns:
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      row:
        audit_id: "{{audit_id}}"
        batch_id: "{{batch_id}}"
        event_type: lifecycle_round_trip
        status: ok
        detail: batch created, persisted, cleaned, and verified
        success_count: "{{detail_scan.iterations}}"
        failure_count: 0
        source_lesson: "80"

  - action: db_query_one
    connection: reporting
    save_as: pre_cleanup_summary
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: pre_cleanup_detail
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: redis_del
    key: "{{payload_key}}"
    save_as: payload_deleted

  - action: redis_del
    key: "{{latest_key}}"
    save_as: latest_deleted

  - action: db_execute
    connection: reporting
    save_as: rows_deleted
    with:
      sql: DELETE FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_execute
    connection: reporting
    save_as: batch_deleted
    with:
      sql: DELETE FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: post_cleanup_summary
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: post_cleanup_detail
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: audit_row
    with:
      sql: SELECT audit_id, batch_id, event_type, status, detail, success_count, failure_count, source_lesson FROM public.tutorial_import_audits WHERE audit_id = $1
      args:
        - "{{audit_id}}"

  - action: append_var
    save_as: report_rows
    with:
      value:
        batch_id: "{{batch_id}}"
        audit_id: "{{audit_id}}"
        input_file: "{{input_file}}"
        payload_key: "{{payload_key}}"
        pre_cleanup_summary: "{{pre_cleanup_summary.row_count}}"
        pre_cleanup_detail: "{{pre_cleanup_detail.row_count}}"
        post_cleanup_summary: "{{post_cleanup_summary.row_count}}"
        post_cleanup_detail: "{{post_cleanup_detail.row_count}}"
        payload_deleted: "{{payload_deleted}}"
        latest_deleted: "{{latest_deleted}}"

  - action: write_csv
    file_path: artifacts/tutorials/80-external-sync-lifecycle-round-trip-flow.csv
    with:
      value: "{{report_rows}}"
      headers:
        - batch_id
        - audit_id
        - input_file
        - payload_key
        - pre_cleanup_summary
        - pre_cleanup_detail
        - post_cleanup_summary
        - post_cleanup_detail
        - payload_deleted
        - latest_deleted

  - action: write_json
    file_path: artifacts/tutorials/80-external-sync-lifecycle-round-trip-flow.json
    with:
      value:
        lesson: "80"
        mode: flow
        input_file: "{{input_file}}"
        batch_id: "{{batch_id}}"
        audit_id: "{{audit_id}}"
        payload_key: "{{payload_key}}"
        transaction_result: "{{transaction_result}}"
        summary_upsert_result: "{{summary_upsert_result}}"
        detail_insert_result: "{{detail_insert_result}}"
        audit_upsert_result: "{{audit_upsert_result}}"
        pre_cleanup_summary: "{{pre_cleanup_summary}}"
        pre_cleanup_detail: "{{pre_cleanup_detail}}"
        rows_deleted: "{{rows_deleted}}"
        batch_deleted: "{{batch_deleted}}"
        post_cleanup_summary: "{{post_cleanup_summary}}"
        post_cleanup_detail: "{{post_cleanup_detail}}"
        audit_row: "{{audit_row}}"
