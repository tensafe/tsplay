schema_version: "1"
name: lesson_37_load_saved_storage_state_flow
description: Reuse a saved browser storage-state file and land directly in the logged-in session lab page.
browser:
  storage_state: tutorials/36-session-lab-flow-state.json
vars:
  page_url: http://127.0.0.1:8000/demo/session_lab.html
  loaded_state_path: artifacts/tutorials/36-session-lab-flow-state.json
steps:
  - action: navigate
    url: "{{page_url}}"

  - action: assert_text
    selector: "#session-status"
    text: "Logged in as"
    timeout: 5000

  - action: extract_text
    selector: "#session-status"
    timeout: 5000
    save_as: session_status

  - action: get_cookies_string
    save_as: cookie_header

  - action: set_var
    save_as: payload
    with:
      value:
        lesson: "37"
        mode: flow
        page_url: "{{page_url}}"
        loaded_state_path: "{{loaded_state_path}}"
        session_status: "{{session_status}}"
        cookie_header: "{{cookie_header}}"

  - action: write_json
    file_path: artifacts/tutorials/37-load-saved-storage-state-flow.json
    value: "{{payload}}"
