schema_version: "1"
name: lesson_76_query_external_sync_audit_history_flow
description: Query every audit row for the latest shared batch and save the history into JSON.
vars:
  latest_key: tutorial:session_import:latest_batch
steps:
  - action: redis_get
    key: "{{latest_key}}"
    save_as: latest_batch_id

  - action: db_query
    connection: reporting
    save_as: audit_rows
    with:
      sql: SELECT audit_id, batch_id, event_type, status, detail, success_count, failure_count, source_lesson FROM public.tutorial_import_audits WHERE batch_id = $1 ORDER BY audit_id
      args:
        - "{{latest_batch_id}}"

  - action: write_json
    file_path: artifacts/tutorials/76-query-external-sync-audit-history-flow.json
    with:
      value:
        lesson: "76"
        mode: flow
        latest_batch_id: "{{latest_batch_id}}"
        audit_rows: "{{audit_rows}}"
