schema_version: "1"
name: lesson_84_write_replay_audit_row_flow
description: Write a dedicated audit row for the replayed batch that was rebuilt from lifecycle evidence.
vars:
  lifecycle_file: artifacts/tutorials/80-external-sync-lifecycle-round-trip-flow.csv
  replay_file: artifacts/tutorials/82-replay-batch-from-lifecycle-evidence-flow.csv
  original_batch_id: ""
  original_audit_id: ""
  input_file: ""
  replay_batch_id: ""
steps:
  - action: read_csv
    file_path: "{{lifecycle_file}}"
    save_as: lifecycle_rows

  - action: foreach
    items: "{{lifecycle_rows}}"
    item_var: row
    index_var: row_index
    save_as: lifecycle_scan
    steps:
      - action: set_var
        save_as: original_batch_id
        with:
          value: "{{row.batch_id}}"
      - action: set_var
        save_as: original_audit_id
        with:
          value: "{{row.audit_id}}"
      - action: set_var
        save_as: input_file
        with:
          value: "{{row.input_file}}"

  - action: read_csv
    file_path: "{{replay_file}}"
    save_as: replay_rows

  - action: foreach
    items: "{{replay_rows}}"
    item_var: row
    index_var: row_index
    save_as: replay_scan
    steps:
      - action: set_var
        save_as: replay_batch_id
        with:
          value: "{{row.replay_batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: summary_row
    with:
      sql: SELECT batch_id, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{replay_batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: detail_count_row
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{replay_batch_id}}"

  - action: set_var
    save_as: audit_id
    with:
      value: "{{replay_batch_id}}-replay-audit"

  - action: db_upsert
    connection: reporting
    save_as: audit_upsert_result
    with:
      table: public.tutorial_import_audits
      columns:
        - audit_id
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      key_columns:
        - audit_id
      update_columns:
        - batch_id
        - event_type
        - status
        - detail
        - success_count
        - failure_count
        - source_lesson
      row:
        audit_id: "{{audit_id}}"
        batch_id: "{{replay_batch_id}}"
        event_type: replay_from_lifecycle
        status: ok
        detail: "replayed from {{original_batch_id}} using {{input_file}} and source audit {{original_audit_id}}"
        success_count: "{{detail_count_row.row_count}}"
        failure_count: 0
        source_lesson: "84"

  - action: db_query_one
    connection: reporting
    save_as: audit_row
    with:
      sql: SELECT audit_id, batch_id, event_type, status, detail, success_count, failure_count, source_lesson FROM public.tutorial_import_audits WHERE audit_id = $1
      args:
        - "{{audit_id}}"

  - action: write_json
    file_path: artifacts/tutorials/84-write-replay-audit-row-flow.json
    with:
      value:
        lesson: "84"
        mode: flow
        lifecycle_file: "{{lifecycle_file}}"
        replay_file: "{{replay_file}}"
        source_batch_id: "{{original_batch_id}}"
        replay_batch_id: "{{replay_batch_id}}"
        audit_id: "{{audit_id}}"
        summary_row: "{{summary_row}}"
        detail_count_row: "{{detail_count_row}}"
        audit_upsert_result: "{{audit_upsert_result}}"
        audit_row: "{{audit_row}}"
