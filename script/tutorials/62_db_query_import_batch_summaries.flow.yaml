schema_version: "1"
name: lesson_62_db_query_import_batch_summaries_flow
description: Insert two import batch summaries and query them back as a list from Postgres.
vars:
  input_file: artifacts/tutorials/57-use-session-import-export-round-trip-flow.csv
  batch_prefix: lesson-62-import-batch-
  operator_name: unknown
steps:
  - action: read_csv
    file_path: "{{input_file}}"
    save_as: rows

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: summary_scan
    steps:
      - action: set_var
        save_as: operator_name
        with:
          value: "{{row.operator}}"

  - action: db_execute
    connection: reporting
    save_as: cleanup
    with:
      sql: DELETE FROM public.tutorial_import_batches WHERE batch_id LIKE $1
      args:
        - "{{batch_prefix}}%"

  - action: db_insert
    connection: reporting
    save_as: insert_one
    with:
      table: public.tutorial_import_batches
      columns:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      row:
        batch_id: "{{batch_prefix}}a"
        report_file: "{{input_file}}#a"
        source_lesson: "62"
        row_count: "{{summary_scan.iterations}}"
        operator_name: "{{operator_name}}"

  - action: db_insert
    connection: reporting
    save_as: insert_two
    with:
      table: public.tutorial_import_batches
      columns:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      row:
        batch_id: "{{batch_prefix}}b"
        report_file: "{{input_file}}#b"
        source_lesson: "62"
        row_count: "{{summary_scan.iterations}}"
        operator_name: "{{operator_name}}"

  - action: db_query
    connection: reporting
    save_as: batch_rows
    with:
      sql: SELECT batch_id, report_file, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id LIKE $1 ORDER BY batch_id
      args:
        - "{{batch_prefix}}%"

  - action: write_json
    file_path: artifacts/tutorials/62-db-query-import-batch-summaries-flow.json
    with:
      value:
        lesson: "62"
        mode: flow
        input_file: "{{input_file}}"
        batch_prefix: "{{batch_prefix}}"
        cleanup: "{{cleanup}}"
        insert_one: "{{insert_one}}"
        insert_two: "{{insert_two}}"
        batch_rows: "{{batch_rows}}"
