schema_version: "1"
name: lesson_86_build_post_replay_reconciliation_pack_flow
description: Combine lifecycle evidence, replay state, and audit comparison into one reconciliation pack.
vars:
  lifecycle_file: artifacts/tutorials/80-external-sync-lifecycle-round-trip-flow.csv
  replay_file: artifacts/tutorials/82-replay-batch-from-lifecycle-evidence-flow.csv
  audit_compare_file: artifacts/tutorials/85-export-original-and-replay-audits-flow.csv
  original_batch_id: ""
  replay_batch_id: ""
  expected_row_count: "0"
  payload_key: ""
  replay_row_count: "0"
  report_rows: []
steps:
  - action: read_csv
    file_path: "{{lifecycle_file}}"
    save_as: lifecycle_rows

  - action: foreach
    items: "{{lifecycle_rows}}"
    item_var: row
    index_var: row_index
    save_as: lifecycle_scan
    steps:
      - action: set_var
        save_as: original_batch_id
        with:
          value: "{{row.batch_id}}"
      - action: set_var
        save_as: expected_row_count
        with:
          value: "{{row.pre_cleanup_detail}}"

  - action: read_csv
    file_path: "{{replay_file}}"
    save_as: replay_rows

  - action: foreach
    items: "{{replay_rows}}"
    item_var: row
    index_var: row_index
    save_as: replay_scan
    steps:
      - action: set_var
        save_as: replay_batch_id
        with:
          value: "{{row.replay_batch_id}}"
      - action: set_var
        save_as: payload_key
        with:
          value: "{{row.payload_key}}"
      - action: set_var
        save_as: replay_row_count
        with:
          value: "{{row.row_count}}"

  - action: read_csv
    file_path: "{{audit_compare_file}}"
    save_as: audit_rows

  - action: redis_get
    key: "{{payload_key}}"
    save_as: payload_text

  - action: json_extract
    value: "{{payload_text}}"
    path: $.row_count
    save_as: replay_payload_row_count

  - action: db_query_one
    connection: reporting
    save_as: summary_row
    with:
      sql: SELECT batch_id, report_file, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{replay_batch_id}}"

  - action: db_query_one
    connection: reporting
    save_as: detail_count_row
    with:
      sql: SELECT COUNT(*) AS row_count FROM public.tutorial_import_rows WHERE batch_id = $1
      args:
        - "{{replay_batch_id}}"

  - action: lua
    save_as: audit_counts
    code: |
      local original_count = 0
      local replay_count = 0
      for _, row in ipairs(audit_rows or {}) do
        local group = tostring(row.group or "")
        if group == "original" then
          original_count = original_count + 1
        elseif group == "replay" then
          replay_count = replay_count + 1
        end
      end
      local expected = tonumber(expected_row_count) or 0
      local replay_rows = tonumber(replay_row_count) or 0
      local payload_rows = tonumber(replay_payload_row_count) or 0
      local summary_rows = tonumber(summary_row.row_count) or 0
      local detail_rows = tonumber(detail_count_row.row_count) or 0
      if replay_rows ~= expected then
        error("replay csv row count mismatch: replay=" .. tostring(replay_rows) .. " expected=" .. tostring(expected))
      end
      if payload_rows ~= expected then
        error("payload row count mismatch: payload=" .. tostring(payload_rows) .. " expected=" .. tostring(expected))
      end
      if summary_rows ~= expected or detail_rows ~= expected then
        error("database row count mismatch: summary=" .. tostring(summary_rows) .. " detail=" .. tostring(detail_rows) .. " expected=" .. tostring(expected))
      end
      return {
        original_audit_row_count = original_count,
        replay_audit_row_count = replay_count,
        expected_row_count = expected,
        replay_row_count = replay_rows,
        payload_row_count = payload_rows,
        db_row_count = detail_rows,
        status = "ok",
      }

  - action: append_var
    save_as: report_rows
    with:
      value:
        original_batch_id: "{{original_batch_id}}"
        replay_batch_id: "{{replay_batch_id}}"
        expected_row_count: "{{audit_counts.expected_row_count}}"
        replay_row_count: "{{audit_counts.replay_row_count}}"
        payload_row_count: "{{audit_counts.payload_row_count}}"
        db_row_count: "{{audit_counts.db_row_count}}"
        original_audit_row_count: "{{audit_counts.original_audit_row_count}}"
        replay_audit_row_count: "{{audit_counts.replay_audit_row_count}}"
        status: "{{audit_counts.status}}"

  - action: write_csv
    file_path: artifacts/tutorials/86-build-post-replay-reconciliation-pack-flow.csv
    with:
      value: "{{report_rows}}"
      headers:
        - original_batch_id
        - replay_batch_id
        - expected_row_count
        - replay_row_count
        - payload_row_count
        - db_row_count
        - original_audit_row_count
        - replay_audit_row_count
        - status

  - action: write_json
    file_path: artifacts/tutorials/86-build-post-replay-reconciliation-pack-flow.json
    with:
      value:
        lesson: "86"
        mode: flow
        lifecycle_file: "{{lifecycle_file}}"
        replay_file: "{{replay_file}}"
        audit_compare_file: "{{audit_compare_file}}"
        summary_row: "{{summary_row}}"
        detail_count_row: "{{detail_count_row}}"
        audit_counts: "{{audit_counts}}"
        report_rows: "{{report_rows}}"
