schema_version: "1"
name: lesson_63_db_upsert_import_batch_summary_flow
description: Seed one import batch summary row and then update it with db_upsert.
vars:
  input_file: artifacts/tutorials/57-use-session-import-export-round-trip-flow.csv
  batch_id: lesson-63-import-batch
  operator_name: unknown
steps:
  - action: read_csv
    file_path: "{{input_file}}"
    save_as: rows

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: summary_scan
    steps:
      - action: set_var
        save_as: operator_name
        with:
          value: "{{row.operator}}"

  - action: db_execute
    connection: reporting
    save_as: cleanup
    with:
      sql: DELETE FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_insert
    connection: reporting
    save_as: seed_insert
    with:
      table: public.tutorial_import_batches
      columns:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      row:
        batch_id: "{{batch_id}}"
        report_file: seed.csv
        source_lesson: 63-seed
        row_count: 1
        operator_name: seed-user

  - action: db_upsert
    connection: reporting
    save_as: upsert_result
    with:
      table: public.tutorial_import_batches
      columns:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      key_columns:
        - batch_id
      update_columns:
        - report_file
        - source_lesson
        - row_count
        - operator_name
      returning:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      row:
        batch_id: "{{batch_id}}"
        report_file: "{{input_file}}"
        source_lesson: "57"
        row_count: "{{summary_scan.iterations}}"
        operator_name: "{{operator_name}}"

  - action: db_query_one
    connection: reporting
    save_as: row
    with:
      sql: SELECT batch_id, report_file, source_lesson, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: write_json
    file_path: artifacts/tutorials/63-db-upsert-import-batch-summary-flow.json
    with:
      value:
        lesson: "63"
        mode: flow
        input_file: "{{input_file}}"
        batch_id: "{{batch_id}}"
        cleanup: "{{cleanup}}"
        seed_insert: "{{seed_insert}}"
        upsert_result: "{{upsert_result}}"
        row: "{{row}}"
