schema_version: "1"
name: lesson_61_db_insert_import_batch_summary_flow
description: Read the Lesson 57 export CSV and insert one import batch summary into Postgres.
vars:
  input_file: artifacts/tutorials/57-use-session-import-export-round-trip-flow.csv
  batch_id: lesson-61-import-batch
  operator_name: unknown
steps:
  - action: read_csv
    file_path: "{{input_file}}"
    save_as: rows

  - action: foreach
    items: "{{rows}}"
    item_var: row
    index_var: row_index
    save_as: summary_scan
    steps:
      - action: set_var
        save_as: operator_name
        with:
          value: "{{row.operator}}"

  - action: db_execute
    connection: reporting
    save_as: cleanup
    with:
      sql: DELETE FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: db_insert
    connection: reporting
    save_as: insert_result
    with:
      table: public.tutorial_import_batches
      columns:
        - batch_id
        - report_file
        - source_lesson
        - row_count
        - operator_name
      row:
        batch_id: "{{batch_id}}"
        report_file: "{{input_file}}"
        source_lesson: "57"
        row_count: "{{summary_scan.iterations}}"
        operator_name: "{{operator_name}}"

  - action: db_query_one
    connection: reporting
    save_as: row
    with:
      sql: SELECT batch_id, report_file, source_lesson, row_count, operator_name FROM public.tutorial_import_batches WHERE batch_id = $1
      args:
        - "{{batch_id}}"

  - action: write_json
    file_path: artifacts/tutorials/61-db-insert-import-batch-summary-flow.json
    with:
      value:
        lesson: "61"
        mode: flow
        input_file: "{{input_file}}"
        batch_id: "{{batch_id}}"
        cleanup: "{{cleanup}}"
        insert_result: "{{insert_result}}"
        row: "{{row}}"
