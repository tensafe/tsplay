schema_version: "1"
name: lesson_152_junior_capstone_brief_flow
description: Build a junior capstone brief that combines local demo pages, file inputs, and basic recovery into one assignment.
steps:
  - action: set_var
    save_as: capstone_brief
    with:
      value:
        lesson: "152"
        target_role: junior
        required_lessons:
          - "09"
          - "10"
          - "13"
          - "16"
          - "18"
          - "20"
          - "22"
          - "23"
        assignment:
          - start file-srv
          - automate at least one local demo page
          - include one upload or download action
          - include one csv-driven loop
          - include one local recovery branch
        deliverables:
          - runnable flow
          - artifact pack
          - csv ledger
          - short design note

  - action: write_json
    file_path: artifacts/tutorials/152/junior-capstone-brief.json
    with:
      value: "{{capstone_brief}}"
    save_as: write_result
