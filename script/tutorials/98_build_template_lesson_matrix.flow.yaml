schema_version: "1"
name: lesson_98_build_template_lesson_matrix_flow
description: Build a simple lesson matrix that maps common scenarios to the reusable handoff templates.
vars:
  template_index_file: artifacts/tutorials/96-build-template-index-flow.csv
  template_catalog_file: artifacts/tutorials/92-build-template-artifact-catalog-flow.csv
  input_artifact: lifecycle_evidence
  process_artifact: replay_result
  verify_artifact: audit_comparison
  matrix_rows: []
steps:
  - action: read_csv
    file_path: "{{template_index_file}}"
    save_as: index_rows

  - action: read_csv
    file_path: "{{template_catalog_file}}"
    save_as: catalog_rows

  - action: foreach
    items: "{{catalog_rows}}"
    item_var: row
    index_var: row_index
    save_as: catalog_scan
    steps:
      - action: if
        condition:
          action: lua
          code: return tostring(row.phase or "") == "input"
        then:
          - action: set_var
            save_as: input_artifact
            with:
              value: "{{row.artifact_key}}"
      - action: if
        condition:
          action: lua
          code: return tostring(row.phase or "") == "process"
        then:
          - action: set_var
            save_as: process_artifact
            with:
              value: "{{row.artifact_key}}"
      - action: if
        condition:
          action: lua
          code: return tostring(row.phase or "") == "verify"
        then:
          - action: set_var
            save_as: verify_artifact
            with:
              value: "{{row.artifact_key}}"

  - action: append_var
    save_as: matrix_rows
    with:
      value:
        scenario: restore_from_lifecycle
        template_name: handoff_input_process_output
        starting_artifact: "{{input_artifact}}"
        expected_output: reconciliation_pack
        lesson_range: 91-93

  - action: append_var
    save_as: matrix_rows
    with:
      value:
        scenario: review_handoff_quality
        template_name: handoff_collect_verify_save
        starting_artifact: "{{verify_artifact}}"
        expected_output: template_review_summary
        lesson_range: 94,97

  - action: append_var
    save_as: matrix_rows
    with:
      value:
        scenario: rebuild_delivery_chain
        template_name: handoff_replay_audit_handoff
        starting_artifact: "{{process_artifact}}"
        expected_output: handoff_summary
        lesson_range: 95-96

  - action: write_csv
    file_path: artifacts/tutorials/98-build-template-lesson-matrix-flow.csv
    with:
      value: "{{matrix_rows}}"
      headers:
        - scenario
        - template_name
        - starting_artifact
        - expected_output
        - lesson_range

  - action: write_json
    file_path: artifacts/tutorials/98-build-template-lesson-matrix-flow.json
    with:
      value:
        lesson: "98"
        mode: flow
        matrix_rows: "{{matrix_rows}}"
