schema_version: "1"
name: send_email_qq_attachment_test
description: Generate a small Excel report, then send it as an attachment through smtp.qq.com over implicit TLS on port 465.
vars:
  sender_email: "xxxx@qq.com"
  sender_password: ""
  recipient_emails:
    - "xxx@qq.com"
    - "xxx@gmail.com"
  subject_text: "TSPlay QQ SMTP attachment test"
  body_text: |
    This is a TSPlay attachment test email.
    The Excel report was generated by the Flow itself and attached automatically.
  report_rows:
    - item: "SMTP connectivity"
      status: "ready"
      attempts: 1
      success: true
    - item: "Attachment pipeline"
      status: "ready"
      attempts: 1
      success: true
steps:
  - action: write_excel
    save_as: attachment_file
    file_path: artifacts/tutorials/send_email_attachment_report.xlsx
    sheet: Summary
    with:
      value: "{{report_rows}}"
      headers:
        - item
        - status
        - attempts
        - success

  - action: send_email
    save_as: email_result
    with:
      to: "{{recipient_emails}}"
      subject: "{{subject_text}}"
      body: "{{body_text}}"
      from_email: "{{sender_email}}"
      attachments:
        - path: artifacts/tutorials/send_email_attachment_report.xlsx
          name: tsplay-email-test.xlsx
          content_type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      smtp:
        host: smtp.qq.com
        port: 465
        username: "{{sender_email}}"
        password: "{{sender_password}}"
        from: "{{sender_email}}"
        tls_mode: tls

  - action: write_json
    file_path: artifacts/tutorials/send_email_qq_attachment_test_result.json
    with:
      value:
        attachment_file: "{{attachment_file}}"
        email_result: "{{email_result}}"
