schema_version: "1"
name: lesson_29_read_cookies_string_flow
description: Seed local browser state on the session lab page, then capture the cookie header string.
vars:
  page_url: http://127.0.0.1:8000/demo/session_lab.html
  username: demo-user
steps:
  - action: navigate
    url: "{{page_url}}"

  - action: wait_for_selector
    selector: "#page-title"
    timeout: 5000

  - action: click
    selector: "#clear-state"

  - action: type_text
    selector: "#username"
    text: "{{username}}"

  - action: click
    selector: "#login"

  - action: assert_text
    selector: "#session-status"
    text: "Logged in as"
    timeout: 5000

  - action: get_cookies_string
    save_as: cookie_header

  - action: set_var
    save_as: payload
    with:
      value:
        lesson: "29"
        mode: flow
        page_url: "{{page_url}}"
        username: "{{username}}"
        cookie_header: "{{cookie_header}}"

  - action: write_json
    file_path: artifacts/tutorials/29-read-cookies-string-flow.json
    value: "{{payload}}"
