schema_version: "1"
name: lesson_131_review_readability_after_flow
description: Build a lesson review summary payload and write it to a lesson-specific tutorial artifact.
steps:
  - action: set_var
    save_as: review_payload
    with:
      value:
        lesson: "131"
        module: review_basics
        review_status: ready

  - action: write_json
    file_path: artifacts/tutorials/131/review-summary.json
    with:
      value: "{{review_payload}}"
    save_as: write_result
