schema_version: "1"
name: lesson_93_build_input_process_output_template_flow
description: Turn the handoff artifact catalog into a reusable input-process-output template.
vars:
  template_catalog_file: artifacts/tutorials/92-build-template-artifact-catalog-flow.csv
  handoff_file: artifacts/tutorials/90-handoff-round-trip-from-lifecycle-evidence-flow.csv
  stage_rows: []
steps:
  - action: read_csv
    file_path: "{{template_catalog_file}}"
    save_as: catalog_rows

  - action: read_csv
    file_path: "{{handoff_file}}"
    save_as: handoff_rows

  - action: foreach
    items: "{{catalog_rows}}"
    item_var: row
    index_var: row_index
    save_as: catalog_scan
    steps:
      - action: lua
        save_as: stage_row
        code: |
          local artifact_key = tostring(row.artifact_key or "")
          local stage = "process"
          if artifact_key == "lifecycle_evidence" then
            stage = "input"
          elseif artifact_key == "reconciliation_pack" then
            stage = "output"
          end
          return {
            stage = stage,
            template_slot = tostring(row.template_slot or ""),
            artifact_key = artifact_key,
            required_env = tostring(row.required_env or ""),
            default_path = tostring(row.default_path or ""),
            recommended_actions = tostring(row.action_focus or ""),
            note = tostring(row.note or ""),
          }
      - action: append_var
        save_as: stage_rows
        with:
          value: "{{stage_row}}"

  - action: append_var
    save_as: stage_rows
    with:
      value:
        stage: output
        template_slot: output.handoff_summary_csv
        artifact_key: handoff_summary
        required_env: TSPLAY_HANDOFF_FILE
        default_path: "{{handoff_file}}"
        recommended_actions: read_csv,write_json
        note: final handoff round trip summary

  - action: write_csv
    file_path: artifacts/tutorials/93-build-input-process-output-template-flow.csv
    with:
      value: "{{stage_rows}}"
      headers:
        - stage
        - template_slot
        - artifact_key
        - required_env
        - default_path
        - recommended_actions
        - note

  - action: write_json
    file_path: artifacts/tutorials/93-build-input-process-output-template-flow.json
    with:
      value:
        lesson: "93"
        mode: flow
        template_catalog_file: "{{template_catalog_file}}"
        handoff_file: "{{handoff_file}}"
        handoff_rows: "{{handoff_rows}}"
        stage_rows: "{{stage_rows}}"
